name: CI - SecureClient DevSecOps

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "hotfix/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-check:
    name: Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch flow
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Branch flow is enforced on pull requests."
            exit 0
          fi

          head="${{ github.head_ref }}"
          base="${{ github.base_ref }}"

          if [[ "$base" == "develop" && "$head" =~ ^feature\/[a-zA-Z0-9._-]+-[a-z0-9._-]+$ ]]; then
            exit 0
          fi

          if [[ "$base" == "main" && ( "$head" == "develop" || "$head" =~ ^hotfix\/[a-zA-Z0-9._-]+-[a-z0-9._-]+$ ) ]]; then
            exit 0
          fi

          if [[ "$base" == "develop" && "$head" =~ ^hotfix\/[a-zA-Z0-9._-]+-[a-z0-9._-]+$ ]]; then
            exit 0
          fi

          echo "::error::Flujo invalido: use feature/<id>-descripcion -> develop, develop -> main, o hotfix/<id>-descripcion -> main/develop."
          exit 1

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = /^(feat|fix|chore|docs|build|test|ci|cd): [a-z0-9][a-z0-9 .,:;()/_-]*$/;
            const {owner, repo} = context.repo;
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });
            const invalid = commits
              .map((commit) => commit.commit.message.split('\n')[0])
              .filter((subject) => !allowed.test(subject));
            if (invalid.length > 0) {
              core.setFailed(`Commits fuera de convencion:\n${invalid.map((item) => `- ${item}`).join('\n')}`);
            }

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend
        id: backend
        shell: bash
        run: |
          if [[ -d backend ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.backend.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        if: steps.backend.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install ruff pytest pytest-cov bandit pip-audit

      - name: Ruff static analysis
        if: steps.backend.outputs.exists == 'true'
        run: cd backend && ruff check .

      - name: Bandit security scan
        if: steps.backend.outputs.exists == 'true'
        run: cd backend && bandit -r . -x "*/tests/*,*/.venv/*" -ll

      - name: pip audit
        if: steps.backend.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          if [[ -f requirements.txt ]]; then
            pip-audit -r requirements.txt --progress-spinner off
          else
            pip-audit --progress-spinner off
          fi

      - name: Pytest
        if: steps.backend.outputs.exists == 'true'
        shell: bash
        run: |
          cd backend
          if [[ -d tests ]]; then
            pytest --cov=. --cov-report=term-missing
          else
            echo "No backend/tests directory yet; skipping pytest."
          fi

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend
        id: frontend
        shell: bash
        run: |
          if [[ -f frontend/package.json ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.frontend.outputs.exists == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        if: steps.frontend.outputs.exists == 'true'
        shell: bash
        run: |
          cd frontend
          if [[ -f bun.lock || -f bun.lockb ]]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: bun audit
        if: steps.frontend.outputs.exists == 'true'
        run: cd frontend && bun audit

      - name: Lint
        if: steps.frontend.outputs.exists == 'true'
        shell: bash
        run: |
          cd frontend
          if bun run | grep -E "^\\s*lint\\b" >/dev/null; then
            bun run lint
          else
            echo "No lint script defined; skipping frontend lint."
          fi

      - name: Test
        if: steps.frontend.outputs.exists == 'true'
        shell: bash
        run: |
          cd frontend
          if bun run | grep -E "^\\s*test\\b" >/dev/null; then
            bun run test -- --run
          else
            echo "No test script defined; skipping frontend tests."
          fi

      - name: Build
        if: steps.frontend.outputs.exists == 'true'
        shell: bash
        run: |
          cd frontend
          if bun run | grep -E "^\\s*build\\b" >/dev/null; then
            bun run build
          else
            echo "No build script defined; skipping frontend build."
          fi

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep baseline report
        run: semgrep scan --config p/owasp-top-ten --config p/python --config p/javascript --config p/secrets --sarif --output semgrep.sarif

      - name: Block on application findings
        shell: bash
        run: |
          set -euo pipefail
          targets=()

          if [[ -d backend ]]; then
            targets+=("backend")
          fi

          if [[ -d frontend ]]; then
            targets+=("frontend")
          fi

          if [[ ${#targets[@]} -eq 0 ]]; then
            echo "No backend/frontend application code yet; Semgrep report uploaded without blocking."
            exit 0
          fi

          semgrep scan --config p/owasp-top-ten --config p/python --config p/javascript --config p/secrets --error "${targets[@]}"

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        shell: bash
        run: |
          if [[ -f docker-compose.yml || -f compose.yml ]]; then
            docker compose config
          else
            echo "No Docker Compose file yet; skipping compose validation."
          fi

      - name: Build backend image
        shell: bash
        run: |
          if [[ -f backend/Dockerfile ]]; then
            docker build -t secureclient-backend:${{ github.sha }} backend
          else
            echo "No backend/Dockerfile yet; skipping backend image build."
          fi

      - name: Build frontend image
        shell: bash
        run: |
          if [[ -f frontend/Dockerfile ]]; then
            docker build -t secureclient-frontend:${{ github.sha }} frontend
          else
            echo "No frontend/Dockerfile yet; skipping frontend image build."
          fi
