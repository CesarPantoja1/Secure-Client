name: CI — SecureClient DevSecOps

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "hotfix/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

# Cancela runs anteriores del mismo ref para ahorrar minutos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Detección de cambios — determina qué jobs ejecutar
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker:   ${{ steps.filter.outputs.docker }}
      ci:       ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # necesario para comparar diffs en push events

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - 'docker-compose.yml'
              - 'compose.yml'
              - '.github/workflows/ci.yml'
            ci:
              - '.github/workflows/**'

  # ─────────────────────────────────────────────────────────────────────────
  # Policy + Commit Convention (prerequisito de todo)
  # ─────────────────────────────────────────────────────────────────────────
  policy-check:
    name: Policy Check
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Validate branch flow
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Branch flow only enforced on pull requests — skipping."
            exit 0
          fi

          head="${{ github.head_ref }}"
          base="${{ github.base_ref }}"

          # feature/** → develop
          if [[ "$base" == "develop" && "$head" =~ ^feature\/[a-zA-Z0-9._-]+-[a-z0-9._-]+$ ]]; then
            exit 0
          fi
          # develop → main
          if [[ "$base" == "main" && "$head" == "develop" ]]; then
            exit 0
          fi
          # hotfix/** → main o develop
          if [[ "$head" =~ ^hotfix\/[a-zA-Z0-9._-]+-[a-z0-9._-]+$ && ( "$base" == "main" || "$base" == "develop" ) ]]; then
            exit 0
          fi

          echo "::error::Flujo inválido. Combinaciones permitidas:"
          echo "::error::  feature/<id>-descripcion  →  develop"
          echo "::error::  hotfix/<id>-descripcion   →  main | develop"
          echo "::error::  develop                   →  main"
          exit 1

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = /^(feat|fix|chore|docs|build|test|ci|cd): [a-z0-9][a-z0-9 .,:;()/_-]*$/;
            const { owner, repo } = context.repo;
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: context.payload.pull_request.number, per_page: 100 }
            );
            const invalid = commits
              .map(c => c.commit.message.split('\n')[0])
              .filter(subject => !allowed.test(subject));
            if (invalid.length > 0) {
              core.setFailed(
                `Commits fuera de convención:\n${invalid.map(i => `  - ${i}`).join('\n')}\n\n` +
                `Formato esperado: <tipo>: <descripción en minúsculas>\n` +
                `Tipos válidos: feat | fix | chore | docs | build | test | ci | cd`
              );
            }

  # ─────────────────────────────────────────────────────────────────────────
  # Backend CI — solo si cambian archivos en backend/
  # ─────────────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: [changes, policy-check]
    # Solo corre si hay cambios en backend/
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Check backend exists
        id: check
        run: if [ -d backend ]; then echo "exists=true" >> $GITHUB_OUTPUT; else echo "exists=false" >> $GITHUB_OUTPUT; fi

      - name: Setup Python 3.12
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache de pip para evitar reinstalar en cada run
      - name: Cache pip dependencies
        if: steps.check.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          set -euo pipefail
          cd backend
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install ruff pytest pytest-cov bandit pip-audit

      - name: Ruff — lint + format check
        if: steps.check.outputs.exists == 'true'
        run: |
          cd backend
          ruff check .
          ruff format --check .

      - name: Bandit — security scan
        if: steps.check.outputs.exists == 'true'
        run: |
          cd backend
          bandit -r . -x "*/tests/*,*/.venv/*" -ll

      - name: pip-audit — dependency vulnerabilities
        if: steps.check.outputs.exists == 'true'
        run: |
          set -euo pipefail
          cd backend
          if [[ -f requirements.txt ]]; then
            pip-audit -r requirements.txt --progress-spinner off
          fi

      - name: Pytest
        if: steps.check.outputs.exists == 'true'
        run: |
          cd backend
          if [[ -d tests ]]; then
            pytest --cov=. --cov-report=term-missing --cov-report=xml
          else
            echo "No backend/tests/ aún — saltando pytest."
          fi

      # Subir reporte de cobertura como artifact
      - name: Upload coverage report
        if: always() && steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.sha }}
          path: backend/coverage.xml
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend CI — solo si cambian archivos en frontend/
  # ─────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: [changes, policy-check]
    # Solo corre si hay cambios en frontend/
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: check
        run: if [ -d frontend ]; then echo "exists=true" >> $GITHUB_OUTPUT; else echo "exists=false" >> $GITHUB_OUTPUT; fi

      - name: Setup Bun
        if: steps.check.outputs.exists == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache de módulos de node/bun
      - name: Cache bun dependencies
        if: steps.check.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock', 'frontend/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: bun audit — dependency vulnerabilities
        if: steps.check.outputs.exists == 'true'
        # "|| true" porque bun audit sale con código != 0 si solo hay advisories
        # pero queremos ver el output sin bloquear; Semgrep + p/secrets lo complementa
        run: |
          cd frontend
          bun audit || true

      - name: ESLint
        if: steps.check.outputs.exists == 'true'
        run: |
          cd frontend
          bun run lint

      - name: Tests
        if: steps.check.outputs.exists == 'true'
        run: |
          cd frontend
          if grep -q '"test"' package.json; then
            bun run test -- --run
          else
            echo "No test script definido — saltando."
          fi

      # Build de producción — verifica que el empaquetado no rompe
      - name: Production build
        if: steps.check.outputs.exists == 'true'
        run: |
          cd frontend
          bun run build

      # Subir el dist como artifact para reutilizar en CD sin recompilar
      - name: Upload dist artifact
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Semgrep SAST — corre solo si hay cambios en backend/ o frontend/
  # ─────────────────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: [changes, policy-check]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache de Semgrep para no redescargar reglas en cada run
      - name: Cache Semgrep
        uses: actions/cache@v4
        with:
          path: ~/.semgrep
          key: semgrep-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            semgrep-${{ runner.os }}-

      - name: Install Semgrep
        run: pip install semgrep

      # Construir lista dinámica de targets según qué cambió
      - name: Determine scan targets
        id: targets
        shell: bash
        run: |
          targets=()
          if [[ "${{ needs.changes.outputs.backend }}" == "true" && -d backend ]]; then
            targets+=("backend")
          fi
          if [[ "${{ needs.changes.outputs.frontend }}" == "true" && -d frontend ]]; then
            targets+=("frontend")
          fi
          echo "paths=${targets[*]}" >> "$GITHUB_OUTPUT"

      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/javascript \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --error \
            ${{ steps.targets.outputs.paths }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  # ─────────────────────────────────────────────────────────────────────────
  # Container Build — solo si cambian Dockerfiles o docker-compose.yml
  # Espera a que backend-ci y frontend-ci pasen (si corrieron)
  # ─────────────────────────────────────────────────────────────────────────
  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: [changes, backend-ci, frontend-ci]
    # Corre si: cambió algo Docker-related Y los jobs de app pasaron (o fueron skipped)
    if: |
      always() &&
      needs.changes.outputs.docker == 'true' &&
      (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') &&
      (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      # Habilitar Buildx + cache de capas Docker para builds más rápidos
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose config
        shell: bash
        run: |
          if [[ -f docker-compose.yml || -f compose.yml ]]; then
            docker compose config --quiet
            echo "✓ docker-compose.yml válido"
          else
            echo "No hay docker-compose.yml aún — saltando validación."
          fi

      - name: Build backend image
        if: hashFiles('backend/Dockerfile') != ''
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: secureclient-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        if: hashFiles('frontend/Dockerfile') != ''
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: secureclient-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
